spring.application.name=Comanda-Digital

# Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3306/comanda_digital
spring.datasource.username=root
# Se a variável DB_PASSWORD não existir, ele usa 'iBeus2024' como padrão
spring.datasource.password=${DB_PASSWORD:iBeus2024}

# Hibernate e JPA
# Mudar para 'none' quando começar a usar Flyway para migrations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Documentação da API (Swagger)
# Isso é excelente para o portfólio!
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html